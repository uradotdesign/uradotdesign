services:
  # 1. Your Astro Website
  astro:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:4321:4321" # Expose only to localhost for Nginx reverse proxy
    environment:
      - HOST=0.0.0.0
      - PORT=4321

      # URLs
      - DIRECTUS_URL=http://directus:8055 # Internal
      - PUBLIC_DIRECTUS_URL=https://cms.${DOMAIN_NAME:-ura.design} # Public
      - SITE_URL=https://${DOMAIN_NAME:-ura.design}

      # Weather API
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - WEATHER_LOCATION=${WEATHER_LOCATION:-Berlin}
      - WEATHER_CACHE_TTL=${WEATHER_CACHE_TTL:-900}

      # Redis (if Astro uses it directly)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

      # Shared secret for the /api/revalidate cache hook (called by a Directus
      # Flow on content changes). Endpoint is disabled when unset.
      - REVALIDATE_SECRET=${REVALIDATE_SECRET:-}

      # Live Preview / draft mode. PREVIEW_SECRET gates ?preview=<secret> on
      # detail pages; DIRECTUS_PREVIEW_TOKEN is a server-only, read-only Directus
      # token that can read drafts. Preview is disabled when either is unset.
      - PREVIEW_SECRET=${PREVIEW_SECRET:-}
      - DIRECTUS_PREVIEW_TOKEN=${DIRECTUS_PREVIEW_TOKEN:-}

      # i18n
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-en}
      - AVAILABLE_LOCALES=${AVAILABLE_LOCALES:-en,de}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4321/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      directus:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  # 2. Directus CMS
  directus:
    image: directus/directus:11.17.4
    container_name: directus_cms
    restart: unless-stopped
    ports:
      - "127.0.0.1:8055:8055" # Expose only to localhost for Nginx reverse proxy
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    environment:
      KEY: ${KEY}
      SECRET: ${SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-directus}
      DB_USER: ${POSTGRES_USER:-directus}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-directus}

      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_STORE: ${CACHE_STORE:-redis}
      REDIS: ${REDIS_URL:-redis://redis:6379}

      # CORS - Allow frontend to fetch assets (Lottie, images, etc.)
      CORS_ENABLED: "true"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://${DOMAIN_NAME:-ura.design},https://cms.${DOMAIN_NAME:-ura.design}}"
      CORS_METHODS: "GET,POST,PATCH,DELETE"
      CORS_ALLOWED_HEADERS: "Content-Type,Authorization"
      CORS_EXPOSED_HEADERS: "Content-Range"
      CORS_CREDENTIALS: "true"
      CORS_MAX_AGE: "18000"

      # IMPORTANT: Public URL must match the domain configured in Nginx
      PUBLIC_URL: https://cms.${DOMAIN_NAME:-ura.design}
      WEBSOCKETS_ENABLED: "true"

      # Allow the admin Live Preview pane to embed the Astro frontend in an
      # iframe (frame-src otherwise falls back to the default child-src
      # 'self' blob:, which blocks the cross-origin frontend).
      CONTENT_SECURITY_POLICY_DIRECTIVES__FRAME_SRC: "'self' https://${DOMAIN_NAME:-ura.design} blob:"

      # File Upload Settings
      FILES_MAX_UPLOAD_SIZE: "500MB"

      # Email / SMTP
      EMAIL_FROM: ${EMAIL_FROM:-noreply@ura.design}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-smtp}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE:-false}
      # Validate SMTP TLS certs by default; override to false only for providers
      # whose cert chain requires it (e.g. ProtonMail direct SMTP).
      EMAIL_SMTP_TLS_REJECT_UNAUTHORIZED: ${EMAIL_SMTP_TLS_REJECT_UNAUTHORIZED:-true}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8055/server/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  # 3. Database
  postgres:
    image: postgres:18-alpine
    container_name: directus_postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-directus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-directus}
      POSTGRES_DB: ${POSTGRES_DB:-directus}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # 4. Redis (Cache)
  redis:
    image: redis:8.2.3-alpine
    container_name: ura_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    environment:
      # Optional: set REDIS_PASSWORD in .env to enable authentication. When set,
      # also point the app (REDIS_PASSWORD) and Directus (REDIS url with auth) at it.
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    # Cap memory + evict least-recently-used keys so the cache can't grow
    # unbounded. requirepass is enabled only when REDIS_PASSWORD is provided.
    command: >
      sh -c "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru ${REDIS_PASSWORD:+--requirepass \"$$REDIS_PASSWORD\"}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
  redis_data:
