name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          # Astro 6 requires Node >=22.12; use the current LTS (24).
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (includes astro check)
        run: npm run build
        env:
          # SSR build does not call the CMS, but config.ts reads these; provide
          # harmless defaults so nothing throws during the build.
          DIRECTUS_URL: http://localhost:8055
          PUBLIC_DIRECTUS_URL: http://localhost:8055
